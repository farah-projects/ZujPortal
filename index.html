<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&icon_names=lock"
    />
  </head>
  <body>
    <header>
      <img src="images/lang.png" alt="language" width="80px" height="30px" />
      <br />
      <br />
      <br />
      <br />
      <br />
    </header>

    <main>
      <img src="images/logo.png" alt="logo" width="80%" height="100" /><br />
      <br />
      <br />
      <br />
      <br />
      <br />

      <div class="login-card">
        <h3>Login</h3>
        <form id="loginForm">
          <div class="input-row">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" name="username" />
          </div>

          <div class="input-row">
            <span class="material-symbols-outlined" style="font-size: 22px"
              >lock</span
            >
            <input type="password" id="password" name="password" />
          </div>

          <div class="remember-row">
            <input type="checkbox" name="remember" />
            <small style="color: #bfbfbf">Remember Me</small>
          </div>

          <div class="submit-row">
            <div class="submit-ring">
              <button type="submit" class="submit">
                <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>
          </div>
        </form>
      </div>

      <div style="align-self: flex-start; padding-left: 20px">
        <img
          src="images/fakegallery.png"
          alt="fake gallery"
          width="70px"
          height="65px"
        />
      </div>

      <div style="margin-bottom: -5px">
        <img
          src="images/fakeslider.png"
          alt="fake slider"
          width="90%"
          height="70px"
        />
      </div>

      <div class="footer">
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-linkedin"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>
    </main>

    <script src="/js/login.js"></script>
  </body>
</html>
