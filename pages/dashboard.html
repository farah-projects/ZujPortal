<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <main>
      <div class="hero">
        <img src="images/dashboard/hero.png" />
      </div>

      <div class="notes">
        <img src="images/dashboard/notes.png" />
      </div>

      <div class="cards-row">
        <img src="images/dashboard/academic.png" />
        <img src="images/dashboard/panel.png" />
      </div>

      <div class="cards-row">
        <img src="images/dashboard/register.png" />
        <img src="images/dashboard/personal.png" />
      </div>
    </main>

    <footer id="footer">
      <i class="fa-solid fa-gear" id="settings"></i>
      <i class="fa-solid fa-bell" id="notifications"></i>
      <i class="fa-solid fa-house" id="home" style="color: #259c3e"></i>
    </footer>

    <script src="js/dashboard.js"></script>
  </body>
</html>
